<!DOCTYPE html>
<!-- @dsCard group="Components" -->
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px">
  <div class="row" style="gap:18px; align-items:center; justify-content:space-around">
    <!-- Día 1 -->
    <div class="col-tight center">
      <div style="position:relative; width:96px; height:96px">
        <svg viewBox="0 0 100 100" width="96" height="96">
          <circle cx="50" cy="50" r="42" fill="none" stroke="#F4EDDF" stroke-width="8"/>
          <circle cx="50" cy="50" r="42" fill="none" stroke="#0F5F6E" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="263.9" stroke-dashoffset="261" transform="rotate(-90 50 50)"/>
        </svg>
        <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:32px; font-weight:600; color:#0F5F6E; letter-spacing:-0.03em">1</div>
      </div>
      <div class="label" style="text-transform:none; letter-spacing:0">Día 1 · 1%</div>
    </div>
    <!-- Día 30 -->
    <div class="col-tight center">
      <div style="position:relative; width:96px; height:96px">
        <svg viewBox="0 0 100 100" width="96" height="96">
          <circle cx="50" cy="50" r="42" fill="none" stroke="#F4EDDF" stroke-width="8"/>
          <circle cx="50" cy="50" r="42" fill="none" stroke="#0F5F6E" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="263.9" stroke-dashoffset="176" transform="rotate(-90 50 50)"/>
        </svg>
        <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:32px; font-weight:600; color:#0F5F6E; letter-spacing:-0.03em">30</div>
      </div>
      <div class="label" style="text-transform:none; letter-spacing:0">Día 30 · 33%</div>
    </div>
    <!-- Hito 100 -->
    <div class="col-tight center">
      <div style="position:relative; width:96px; height:96px; filter: drop-shadow(0 0 12px rgba(217,135,106,0.35))">
        <svg viewBox="0 0 100 100" width="96" height="96">
          <circle cx="50" cy="50" r="42" fill="none" stroke="#FBE7DD" stroke-width="8"/>
          <circle cx="50" cy="50" r="42" fill="none" stroke="#D9876A" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="263.9" stroke-dashoffset="0" transform="rotate(-90 50 50)"/>
        </svg>
        <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:30px; font-weight:600; color:#D9876A; letter-spacing:-0.03em">100</div>
      </div>
      <div class="label" style="text-transform:none; letter-spacing:0; color:#D9876A">Hito · terracota</div>
    </div>
    <!-- 365 dial completo dentro -->
    <div class="col-tight center">
      <div style="position:relative; width:96px; height:96px">
        <svg viewBox="0 0 100 100" width="96" height="96">
          <circle cx="50" cy="50" r="42" fill="none" stroke="#F4EDDF" stroke-width="8"/>
          <circle cx="50" cy="50" r="42" fill="none" stroke="#6FA88B" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="263.9" stroke-dashoffset="0" transform="rotate(-90 50 50)"/>
        </svg>
        <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:var(--font-display); color:#6FA88B; letter-spacing:-0.03em">
          <div style="font-size:26px; font-weight:600; line-height:1">365</div>
          <div style="font-family:var(--font-body); font-size:9px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; margin-top:1px">año</div>
        </div>
      </div>
      <div class="label" style="text-transform:none; letter-spacing:0; color:#6FA88B">365 · salvia</div>
    </div>
  </div>
</body></html>
