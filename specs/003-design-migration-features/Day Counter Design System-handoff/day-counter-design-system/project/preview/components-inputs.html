<!DOCTYPE html>
<!-- @dsCard group="Components" -->
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<style>
  .input { font-family: var(--font-body); font-size:15px;
           background:#fff; border:1px solid #E8E0D2; color:#1B2A33;
           padding: 14px 16px; border-radius: 16px; width: 100%;
           transition: border-color 180ms var(--ease-out-soft), box-shadow 180ms var(--ease-out-soft); }
  .input:focus { outline:none; border-color:#0F5F6E; box-shadow: 0 0 0 3px rgba(15,95,110,0.15); }
  .input::placeholder { color:#8B9AA3; }
  .input-error { border-color:#C97062; }
  .chip { display:inline-flex; align-items:center; gap:6px;
          font-family: var(--font-body); font-size:13px; font-weight:600;
          padding: 8px 14px; border-radius: 999px;
          background:#F4EDDF; color:#3D4E58; cursor: pointer; border:none; }
  .chip.active { background:#0F5F6E; color:#fff; }
  .chip.soft-brand { background:#D8EAEC; color:#0F5F6E; }
  .dot { width:8px; height:8px; border-radius:999px; background:currentColor; }
</style>
<body style="padding:24px">
  <div class="col" style="gap:14px">
    <div class="row" style="gap:10px">
      <input class="input" placeholder="Sin fumar" value="Sin fumar" style="flex:1.4">
      <input class="input" placeholder="5 mar 2025" style="flex:1">
    </div>
    <div class="row wrap" style="gap:8px">
      <button class="chip active"><span class="dot"></span> Activos</button>
      <button class="chip">Pausados</button>
      <button class="chip">Archivados</button>
      <button class="chip soft-brand">Salud</button>
      <button class="chip soft-brand">Ejercicio</button>
      <button class="chip soft-brand">Ahorro</button>
    </div>
  </div>
</body></html>
