<!DOCTYPE html>
<!-- @dsCard group="Spacing" -->
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:32px 24px 36px">
  <div class="row" style="gap:24px; align-items:flex-end">
    <div class="col-tight center" style="flex:1">
      <div style="width:100%; height:72px; background:#fff; border-radius:16px; box-shadow:0 1px 2px rgba(15,95,110,0.06)"></div>
      <div class="label" style="text-transform:none; letter-spacing:0; margin-top:4px">sm · controles</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:#8B9AA3">0 1px 2px / .06</div>
    </div>
    <div class="col-tight center" style="flex:1">
      <div style="width:100%; height:72px; background:#fff; border-radius:16px; box-shadow:0 4px 12px rgba(15,95,110,0.08)"></div>
      <div class="label" style="text-transform:none; letter-spacing:0; margin-top:4px">md · cards</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:#8B9AA3">0 4px 12px / .08</div>
    </div>
    <div class="col-tight center" style="flex:1">
      <div style="width:100%; height:72px; background:#fff; border-radius:16px; box-shadow:0 12px 28px rgba(15,95,110,0.12)"></div>
      <div class="label" style="text-transform:none; letter-spacing:0; margin-top:4px">lg · sheets</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:#8B9AA3">0 12px 28px / .12</div>
    </div>
    <div class="col-tight center" style="flex:1">
      <div style="width:100%; height:72px; background:#fff; border-radius:16px; box-shadow:0 24px 48px rgba(15,95,110,0.16)"></div>
      <div class="label" style="text-transform:none; letter-spacing:0; margin-top:4px">xl · modal</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:#8B9AA3">0 24px 48px / .16</div>
    </div>
  </div>
</body></html>
