<!DOCTYPE html>
<!-- @dsCard group="Colors" -->
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="col" style="gap:10px">
    <div class="row" style="gap:10px">
      <div class="swatch dark" style="background:#6FA88B; flex:1; min-height:64px"><div class="name">Success · Salvia</div><div class="hex">#6FA88B</div></div>
      <div class="swatch" style="background:#E1EDE3; flex:0.6"><div class="name">soft</div><div class="hex">#E1EDE3</div></div>

    </div>
    <div class="row" style="gap:10px">
      <div class="swatch dark" style="background:#D9A05B; flex:1; min-height:64px"><div class="name">Warning · Arena</div><div class="hex">#D9A05B</div></div>
      <div class="swatch" style="background:#FAEED7; flex:0.6"><div class="name">soft</div><div class="hex">#FAEED7</div></div>
      <div class="swatch dark" style="background:#C97062; flex:1; min-height:64px"><div class="name">Danger · Reset</div><div class="hex">#C97062</div></div>
