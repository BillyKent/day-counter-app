<!DOCTYPE html>
<!-- @dsCard group="Spacing" -->
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<style>
  .ease-box {
    width: 32px; height: 32px;
    background: #0F5F6E;
    border-radius: 12px;
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  }
  .track {
    position: relative;
    height: 44px;
    background: #F4EDDF;
    border-radius: 999px;
    overflow: hidden;
  }
  .ease-out .ease-box { animation: slide 2.4s var(--ease-out-soft) infinite alternate; }
  .ease-bounce .ease-box { animation: slide 2.4s var(--ease-bounce) infinite alternate; }
  @keyframes slide { from { left: 4px; } to { left: calc(100% - 36px); } }
</style>
<body style="padding:20px 24px">
  <div class="col" style="gap:12px">
    <div class="col-tight">
      <div class="label" style="text-transform:none; letter-spacing:0">ease-out-soft · 320ms · transiciones base</div>
      <div class="track ease-out"><div class="ease-box"></div></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:#5F7079">cubic-bezier(0.32, 0.72, 0, 1)</div>
    </div>
    <div class="col-tight">
      <div class="label" style="text-transform:none; letter-spacing:0">ease-bounce · 600ms · celebración de hito</div>
      <div class="track ease-bounce"><div class="ease-box" style="background:#D9876A"></div></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:#5F7079">cubic-bezier(0.34, 1.56, 0.64, 1)</div>
    </div>
  </div>
</body></html>
