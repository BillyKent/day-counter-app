build:
  maxIssues: 0
  excludeCorrectable: false

style:
  MagicNumber:
    active: false
  ReturnCount:
    active: false
  UnusedPrivateMember:
    active: true
  WildcardImport:
    active: true

complexity:
  LongMethod:
    active: true
    threshold: 80
  TooManyFunctions:
    active: false
  CyclomaticComplexMethod:
    active: true
    threshold: 18

naming:
  FunctionNaming:
    active: true
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'

empty-blocks:
  EmptyFunctionBlock:
    active: false
